<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NotebookLM 2026 — BAO Academy</title>
 <link rel="icon" type="image/x-icon" href="/assets/orange.png">
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div id="guard-overlay">
  <div class="guard-card">
    <div class="guard-logo">
      <img src="assets/academy-logo.png" alt="BAO Academy" width="120">
    </div>
    <div class="guard-title">Xác thực truy cập</div>
    <div class="guard-sub">Nhập email và số điện thoại để truy cập tài liệu <strong>NotebookLM 2026</strong></div>
    <input id="guard-email" class="guard-input" type="email" placeholder="email@example.com" autocomplete="email"/>
    <input id="guard-phone" class="guard-input" type="tel" placeholder="Số điện thoại (vd: 0912345678)" autocomplete="tel" style="margin-top:.6rem"/>
    <button class="guard-btn" onclick="guardSubmit()">Truy cập tài liệu →</button>
    <div class="guard-error" id="guard-error"></div>
  </div>
</div>

<div id="sidebar"></div>
<div id="main"></div>

<script src="assets/guard.js"></script>
</body>
</html>
